<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ta Place, Ton Histoire, Ta Lumière</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--foret:#2B544E;--lilas:#6B3785;--ciel:#A8BCF6;--soleil:#DF9C6A;--bg:#090C0B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#F0EBE3;font-family:'Inter',sans-serif;min-height:100vh;position:relative;isolation:isolate;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 15% 25%,rgba(43,84,78,.3) 0%,transparent 60%),
  radial-gradient(ellipse 50% 60% at 85% 75%,rgba(107,55,133,.22) 0%,transparent 60%),
  radial-gradient(ellipse 40% 40% at 80% 15%,rgba(125,42,18,.12) 0%,transparent 50%);}
.wrap{max-width:680px;margin:0 auto;padding:0 1.5rem 5rem;position:relative;z-index:1;}
.prog{position:sticky;top:0;z-index:100;padding:1.25rem 0 .5rem;
  background:linear-gradient(to bottom,var(--bg) 65%,transparent);display:none;}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:#8A857F;margin-bottom:8px;}
.prog-track{height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--foret),var(--lilas),var(--ciel));transition:width .6s;}
.screen{padding-top:2rem;animation:ap .4s ease;}
@keyframes ap{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:24px;padding:2.5rem;backdrop-filter:blur(16px);}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--soleil);
  margin-bottom:1.25rem;opacity:.85;text-align:center;}
.hero{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,6vw,4.5rem);font-weight:300;
  line-height:1.08;background:linear-gradient(140deg,var(--ciel) 0%,var(--soleil) 40%,var(--lilas) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:2rem;padding-top:3rem;text-align:center;}
.iq{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--ciel);
  line-height:1.65;margin-bottom:1.5rem;border-left:2px solid var(--ciel);padding-left:1.25rem;opacity:.9;}
.para{color:#8A857F;line-height:1.85;font-size:.95rem;margin-bottom:1rem;}
.lbl{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--soleil);margin-bottom:10px;}
.txt-in{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:14px;padding:1rem 1.25rem;color:#F0EBE3;font-size:1rem;font-family:'Inter',sans-serif;
  outline:none;margin-bottom:2rem;transition:border-color .25s;}
.txt-in:focus{border-color:var(--lilas);box-shadow:0 0 0 3px rgba(107,55,133,.15);}
.txt-in::placeholder{color:rgba(255,255,255,.2);font-style:italic;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.75rem;margin-bottom:.5rem;}
.pbtn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;
  padding:1.1rem 1rem;cursor:pointer;text-align:center;transition:all .2s;color:#F0EBE3;font-family:'Inter',sans-serif;}
.pbtn:hover{border-color:rgba(107,55,133,.5);background:rgba(107,55,133,.1);transform:translateY(-2px);}
.pbtn.on{border-color:var(--lilas);background:rgba(107,55,133,.18);
  box-shadow:0 0 0 1px var(--lilas),0 6px 24px rgba(107,55,133,.25);}
.pi{font-size:1.6rem;margin-bottom:.35rem;} .pn{font-size:.85rem;font-weight:500;}
.qmeta{display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--lilas);margin-bottom:1.75rem;}
.qline{flex:1;height:1px;background:linear-gradient(90deg,var(--lilas),transparent);opacity:.35;}
.qbadge{font-size:11px;padding:.3rem .75rem;border-radius:50px;letter-spacing:.1em;}
.qtext{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,2.8vw,1.7rem);
  font-weight:400;line-height:1.45;color:#F0EBE3;margin-bottom:2rem;}
.ata{width:100%;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.09);
  border-radius:16px;padding:1.25rem;color:#F0EBE3;font-size:.95rem;font-family:'Inter',sans-serif;
  line-height:1.75;resize:vertical;min-height:150px;outline:none;transition:border-color .3s;}
.ata:focus{border-color:var(--ciel);box-shadow:0 0 0 3px rgba(168,188,246,.1);}
.ata::placeholder{color:rgba(255,255,255,.15);font-style:italic;}
.thr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;}
.win{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.09);border-radius:12px;
  padding:1rem .75rem;color:#F0EBE3;font-size:.95rem;font-family:'Inter',sans-serif;
  outline:none;text-align:center;transition:border-color .3s;width:100%;}
.win:focus{border-color:var(--soleil);box-shadow:0 0 0 3px rgba(223,156,106,.12);}
.win::placeholder{color:rgba(255,255,255,.18);font-style:italic;}
.nav{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-top:1.5rem;}
.bback{padding:.875rem 1.75rem;border-radius:50px;font-size:.88rem;font-family:'Inter',sans-serif;
  font-weight:500;cursor:pointer;background:transparent;color:#8A857F;
  border:1px solid rgba(255,255,255,.09);transition:all .25s;}
.bback:hover{border-color:rgba(255,255,255,.2);color:#F0EBE3;}
.bnext{padding:.875rem 2.25rem;border-radius:50px;font-size:.88rem;font-family:'Inter',sans-serif;
  font-weight:500;cursor:pointer;background:linear-gradient(135deg,var(--lilas),#9B5BBD);
  color:#fff;border:none;transition:all .25s;}
.bnext:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(107,55,133,.45);}
.bprim{padding:1rem 2.5rem;font-size:.95rem;font-family:'Inter',sans-serif;font-weight:500;
  cursor:pointer;background:linear-gradient(135deg,var(--foret),var(--lilas));color:#fff;
  border:none;border-radius:14px;display:block;width:100%;margin-top:1.5rem;
  text-align:center;transition:all .25s;}
.bprim:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(43,84,78,.35);}
.bsub{padding:.875rem 2.25rem;font-size:.88rem;font-family:'Inter',sans-serif;font-weight:500;
  cursor:pointer;background:linear-gradient(135deg,var(--foret),var(--lilas));color:#fff;
  border:none;border-radius:14px;transition:all .25s;}
.bsub:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(43,84,78,.45);}
.bsub:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.sh{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;margin-bottom:.5rem;}
.errhint{font-size:13px;color:var(--soleil);margin-bottom:1rem;display:none;}
.ferr{font-size:13px;color:var(--soleil);margin-top:.75rem;display:none;}
.insp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-left:3px solid var(--soleil);border-radius:20px;padding:2rem 2rem 2rem 2.25rem;margin-top:1.5rem;}
.insplbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--soleil);margin-bottom:1rem;}
.inspq{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:#F0EBE3;line-height:1.7;}
.tytitle{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;
  background:linear-gradient(135deg,var(--ciel),var(--soleil));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.25rem;text-align:center;}
@media(max-width:560px){.card{padding:1.75rem 1.5rem}.pgrid{grid-template-columns:repeat(2,1fr)}.thr{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div id="prog" class="prog">
    <div class="prog-meta"><span id="plbl"></span><span id="ppct"></span></div>
    <div class="prog-track"><div id="pfill" class="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="app"></div>
</div>
<script>
var KEY = "a736fd6e-e12a-4fc4-9b57-621d0ce5d743";
var PH = "Prends le temps qu'il te faut...";
var PROFILES = [
  {id:"grande-soeur",  lb:"Grande Soeur",     em:"👩",  msg:"Tu as porte beaucoup. Et tout ce que tu as donne aux autres ne t'a pas ete vole : ca t'a appris une profondeur que peu de gens ont."},
  {id:"grand-frere",   lb:"Grand Frere",       em:"🧑",  msg:"Etre lisible n'est pas une obligation. Mais etre sincere avec toi-meme, c'est ta liberte la plus puissante."},
  {id:"fille-milieu",  lb:"Fille du Milieu",   em:"🌸",  msg:"Ta place n'etait pas evidente, mais tu l'as creee. Ca, c'est une force rare."},
  {id:"garcon-milieu", lb:"Garcon du Milieu",  em:"🌿",  msg:"Ce que tu as construit seul, sans bruit, sans podium, c'est peut-etre la chose la plus solide de toi."},

  {id:"fils-unique",   lb:"Fils Unique",       em:"🌊",  msg:"La profondeur que tu as developpee dans le silence et la solitude, elle n'attend que d'etre partagee avec le monde."},
  {id:"fille-unique",  lb:"Fille Unique",      em:"✨",  msg:"Tu as grandi sous une lumiere intense. Maintenant tu apprends a te rechauffer aussi a ta propre flamme."},
  {id:"jumeaux",       lb:"Jumeaux",           em:"👯",  msg:"Vous avez commence a deux. Mais chacun de vous est un univers complet. Les deux peuvent coexister."},
  {id:"jumelles",      lb:"Jumelles",          em:"👯",  msg:"Vous avez commence a deux. Mais chacune de vous est un univers complet. Les deux peuvent coexister."},
  {id:"cas-part",      lb:"Cas Particulier",   em:"🌟",  msg:"Ton histoire est complexe. Et cette complexite n'est pas un defaut : c'est la richesse de ta singularite."}
];
var OPENING = [
  {id:"co1",sec:"Ouverture",type:"ta", text:"Si tu devais choisir une image, une couleur ou un son qui represente comment tu te sens dans ta famille en ce moment, ce serait quoi ?",ph:"Il n'y a pas de bonne reponse..."},
  {id:"co2",sec:"Ouverture",type:"3w", text:"Quand tu penses a toi, pas a ton role ni a ce qu'on attend de toi... juste toi. Tu te decrirais en trois mots ?",ph:""},
  {id:"co3",sec:"Ouverture",type:"ta", text:"Est-ce qu'il y a une version de toi que tu montres a ta famille, et une autre que tu gardes pour toi ? Laquelle tu preferes et pourquoi ?",ph:"Explore librement..."},
  {id:"co4",sec:"Ouverture",type:"ta", text:"C'est quoi le moment de la semaine ou tu te sens le plus toi-meme, completement libre ?",ph:"Decris ce moment..."}
];
var CLOSING = [
  {id:"cc1",sec:"Cloture",type:"ta", text:"C'est quoi une force en toi que tu n'utilises pas encore assez, et que tu voudrais developper ?",ph:PH},
  {id:"cc2",sec:"Cloture",type:"ta", text:"Si cette conversation t'a mis(e) en lumiere sur quelque chose, c'est quoi ? Une seule chose.",ph:"Meme une petite chose compte..."},
  {id:"cc3",sec:"Cloture",type:"ta", text:"Si ta vie etait un livre en cours d'ecriture, qu'est-ce que tu aimerais qu'on lise dans le prochain chapitre ?",ph:"Ecris le titre de ce chapitre si tu veux..."}
];
var PQ = {
  "grande-soeur":[
    {id:"gs1",text:"Est-ce qu'il y a des attentes que tu portais sur toi dont tu ne savais pas vraiment d'ou elles venaient ? Comment tu les as vecues interieurement ?"},
    {id:"gs2",text:"A quel moment precis tu as decide, consciemment ou non, de prendre soin de toi, pas seulement des autres ?"},
    {id:"gs3",text:"Est-ce qu'il t'est arrive de te sentir seule dans ta position, d'avoir eu besoin qu'on s'occupe aussi de toi sans oser le dire ?"},
    {id:"gs4",text:"Comment tu decris la frontiere, dans ta vie, entre aimer et proteger et s'oublier soi-meme ?"},
    {id:"gs5",text:"Est-ce qu'il y a quelque chose que tu as porte silencieusement pendant des annees et qui meritait d'etre dit a voix haute ?"},
    {id:"gs6",text:"Comment tu te definis en dehors de ton role dans la famille ? C'est quoi ce que tu construis pour toi seule ?"},
    {id:"gs7",text:"Est-ce que tu as parfois ressenti une forme de pression invisible liee au fait d'etre l'ainee ? Comment tu l'as geree ?"},
    {id:"gs8",text:"Qu'est-ce que ta position t'a appris sur toi que tu n'aurais pas appris autrement ?"},
    {id:"gs9",text:"Est-ce qu'il t'est arrive d'envier une legerete que tu voyais chez d'autres sans porter ce que tu portais ? Comment tu as vecu ca ?"},
    {id:"gs10",text:"Si tu pouvais te parler a toi-meme a 10 ans, qu'est-ce que tu te dirais pour alleger ce chemin ?"}
  ],
  "grand-frere":[
    {id:"gb1",text:"C'est quoi pour toi etre un grand frere dans un monde ou les modeles masculins sont souvent flous ou absents ?"},
    {id:"gb2",text:"Est-ce qu'il y a des choses que tu as du apprendre seul, sans vraiment avoir quelqu'un a qui demander ? Comment tu t'en es sorti ?"},
    {id:"gb3",text:"Est-ce que la force, pour toi, ca a toujours ete quelque chose de visible ? Ou est-ce que tu as decouvert d'autres formes de force en toi avec le temps ?"},
    {id:"gb4",text:"Qu'est-ce que tu aurais voulu qu'on te dise plus souvent, qu'on ne t'a jamais dit ?"},
    {id:"gb5",text:"Est-ce qu'il y a eu un moment ou tu t'es senti incompris dans ce que tu vivais, et ou tu as du faire semblant que ca allait ?"},
    {id:"gb6",text:"Comment tu as construit tes propres reperes quand les modeles autour de toi n'etaient pas lisibles ou absents ?"},
    {id:"gb7",text:"Est-ce qu'il t'est arrive de douter de ta place, de te demander si tu faisais les choses comme il fallait ?"},
    {id:"gb8",text:"Qu'est-ce que tu as appris sur la vulnerabilite, sur le fait d'accepter de ne pas avoir toutes les reponses ?"},
    {id:"gb9",text:"Est-ce que le fait d'etre l'aine a parfois pese sur ta liberte, sur les choix que tu as faits ou ceux que tu n'as pas ose faire ?"},
    {id:"gb10",text:"Comment tu imagines la version de toi dans 10 ans, debarrassee de toutes les pressions exterieures ?"}
  ],
  "fille-milieu":[
    {id:"fm1",text:"Est-ce que tu as parfois eu l'impression d'avoir du inventer ta place plutot que de la trouver naturellement ? Comment tu as fait ?"},
    {id:"fm2",text:"Est-ce qu'il t'est arrive de te sentir invisible dans ta famille ? Si oui, comment tu y as repondu ?"},
    {id:"fm3",text:"Quelles sont les qualites que tu as developpees que tu penses uniques a ta position et dont tu es fiere ?"},
    {id:"fm4",text:"Ou est-ce que tu puises ta stabilite interieure quand tu te sens entre deux mondes ?"},
    {id:"fm5",text:"Est-ce que tu as souvent joue un role de mediatrice ou de pacificatrice ? Comment tu as vecu ce role ?"},
    {id:"fm6",text:"Est-ce qu'il y a quelque chose que tu aurais voulu que les gens autour de toi voient en toi, sans que tu aies besoin de le montrer toi-meme ?"},
    {id:"fm7",text:"Comment tu fais la distinction entre ce que tu ressens vraiment et ce que tu crois devoir ressentir pour maintenir l'harmonie ?"},
    {id:"fm8",text:"Est-ce qu'il y a un domaine de ta vie ou tu t'as vraiment affirmee, ou tu as dit : ici c'est moi, c'est mon espace ?"},
    {id:"fm9",text:"Est-ce que ta position dans la fratrie t'a appris quelque chose sur l'adaptation, sur la flexibilite ? Comment tu le vis maintenant ?"},
    {id:"fm10",text:"Si tu pouvais changer une seule chose de comment tu as ete percue dans ta famille, ce serait quoi ?"}
  ],
  "garcon-milieu":[
    {id:"gm1",text:"Comment tu as trouve ton espace a toi dans la famille, quelque chose qui n'appartient qu'a toi ?"},
    {id:"gm2",text:"Est-ce que tu as eu l'impression de devoir te battre pour etre entendu ? Si oui, qu'est-ce que ca t'a appris ?"},
    {id:"gm3",text:"Est-ce qu'il y a une facon dont tu t'es defini que les gens autour de toi n'avaient pas encore vue, une surprise que tu leur as faite ?"},
    {id:"gm4",text:"C'est quoi ta definition personnelle du succes, independamment du regard des autres ?"},
    {id:"gm5",text:"Est-ce qu'il t'est arrive de te sentir coince entre des attentes contradictoires venant de differents cotes ?"},
    {id:"gm6",text:"Comment tu as appris a tenir ta propre ligne dans un espace ou il fallait souvent negocier sa place ?"},
    {id:"gm7",text:"Est-ce qu'il y a une partie de toi qui a mis du temps a s'exprimer, un talent, une passion que tu as longtemps gardee pour toi ?"},
    {id:"gm8",text:"Comment tu vis la relation avec toi-meme, loin des dynamiques familiales ? Tu te connais bien ?"},
    {id:"gm9",text:"Est-ce que ta position t'a rendu plus empathique, plus a l'ecoute des autres ? Comment tu le vis ?"},
    {id:"gm10",text:"C'est quoi une chose que tu ferais differemment si tu pouvais revivre une periode de ta vie familiale ?"}
  ],
  "petite-soeur":[
    {id:"ps1",text:"Est-ce que tu as souvent eu envie de te prouver quelque chose, pas aux autres, mais a toi-meme ?"},
    {id:"ps2",text:"Quand tu penses a l'avenir, est-ce que tu te projettes librement, ou est-ce que tu te sens parfois dans un sillage trace par d'autres avant toi ?"},
    {id:"ps3",text:"Est-ce qu'il y a quelque chose en toi que tu as decouvert seule, sans que personne te l'ait montre ?"},
    {id:"ps4",text:"La legerete qu'on associe parfois aux benjamins, tu la vis comme une liberte ou parfois comme un manque de prise au serieux ?"},
    {id:"ps5",text:"Est-ce qu'il y a des choses que tu as observees, apprises, retenues en regardant les autres avant toi, sans jamais le dire ?"},
    {id:"ps6",text:"Comment tu geres le fait d'etre parfois vue comme la petite alors que tu es bien plus que ca ?"},
    {id:"ps7",text:"Est-ce qu'il y a un moment ou tu as realise que tu avais ta propre voix, ta propre direction, independamment de ce qu'on attendait de toi ?"},
    {id:"ps8",text:"Est-ce que tu as parfois l'impression de devoir meriter ta place autant que les autres, meme si elle etait deja la tienne ?"},
    {id:"ps9",text:"Qu'est-ce que tu aimerais que les gens retiennent de toi, pas de ton rang, juste de toi ?"},
    {id:"ps10",text:"C'est quoi la force en toi dont tu parles le moins mais qui t'a le plus aidee ?"}
  ],
  "petit-frere":[
    {id:"pf1",text:"Est-ce que tu as parfois eu du mal a lire ce que les hommes autour de toi vivaient vraiment ? Comment tu as construit tes propres reperes ?"},
    {id:"pf2",text:"Est-ce qu'il y a eu un moment ou tu as realise que tu allais devoir tracer ton propre chemin, meme sans carte ?"},
    {id:"pf3",text:"Comment tu gardes confiance en toi dans un monde qui peut etre difficile a decrypter ?"},
    {id:"pf4",text:"Qu'est-ce que tu as decouvert sur ta propre force que les autres n'ont peut-etre pas encore vu ?"},
    {id:"pf5",text:"Est-ce que reussir a un sens particulier pour toi ? Qu'est-ce que ca represente profondement ?"},
    {id:"pf6",text:"Est-ce qu'il t'est arrive de porter des douleurs ou des questions en silence parce qu'il n'y avait personne a qui les adresser ?"},
    {id:"pf7",text:"Comment tu as appris a faire confiance a ton propre jugement quand les modeles autour de toi n'etaient pas clairs ?"},
    {id:"pf8",text:"Est-ce qu'il y a une decision de ta vie dont tu es vraiment fier, que tu as prise pour toi, pas pour plaire a quelqu'un ?"},
    {id:"pf9",text:"Comment tu definis ta place dans le monde, pas seulement dans ta famille ? C'est quoi ton ancrage ?"},
    {id:"pf10",text:"Si tu avais un message a envoyer a tous les petits freres qui se sentent seuls dans leur construction, ce serait quoi ?"}
  ],
  "fils-unique":[
    {id:"fu1",text:"Est-ce que la solitude et la serenite sont deux choses que tu distingues facilement, ou est-ce qu'elles se melangent parfois ?"},
    {id:"fu2",text:"Comment tu as gere les attentes que tu portais seul, sans pouvoir les partager avec un frere ou une soeur ?"},
    {id:"fu3",text:"Est-ce que tu as parfois imagine ce que ce serait d'avoir un frere ou une soeur ? Qu'est-ce que tu penses que ca t'aurait donne ?"},
    {id:"fu4",text:"Qu'est-ce que tu as developpe de particulier dans ta relation aux autres, en dehors de la famille ?"},
    {id:"fu5",text:"Est-ce que l'amour et l'attention que tu as recus t'ont parfois paru intenses a porter ? Comment tu as trouve ton equilibre ?"},
    {id:"fu6",text:"Comment tu as construit ton sentiment d'appartenance, a ta famille, mais aussi a quelque chose de plus grand ?"},
    {id:"fu7",text:"Est-ce qu'il y a quelque chose que tu n'as jamais pu partager avec quelqu'un qui comprend vraiment, parce que tu n'avais pas ce miroir fraternel ?"},
    {id:"fu8",text:"Comment tu vis les conflits, les desaccords ? Est-ce que le fait d'etre fils unique a influence ta facon de les traverser ?"},
    {id:"fu9",text:"Qu'est-ce que tu as appris sur toi dans les moments ou tu etais vraiment seul, face a toi-meme ?"},
    {id:"fu10",text:"C'est quoi la chose dont tu es le plus fier d'avoir construite, a partir de ta propre singularite ?"}
  ],
  "fille-unique":[
    {id:"fue1",text:"Comment tu as navigue entre le fait d'etre tout pour tes parents et le besoin d'exister pour toi-meme ?"},

    {id:"jf7",text:"Comment vous avez traverse les etapes importantes de la vie, les differences qui sont apparues entre vous ? Comment tu les as vecues ?"},

var S = {step:"welcome", pid:null, name:"", ans:{}, qs:[], qi:0};

function h(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function secStyle(s) {
  if(s==="Ouverture") return "background:rgba(168,188,246,.12);color:#A8BCF6;border:1px solid rgba(168,188,246,.25)";
  if(s==="Cloture")   return "background:rgba(223,156,106,.12);color:#DF9C6A;border:1px solid rgba(223,156,106,.25)";
  return "background:rgba(107,55,133,.12);color:#6B3785;border:1px solid rgba(107,55,133,.25)";
}
function buildQs(pid) {
  var out = [];
  OPENING.forEach(function(q){ out.push({id:q.id,sec:q.sec,type:q.type,text:q.text,ph:q.ph}); });
  (PQ[pid]||[]).forEach(function(q){ out.push({id:q.id,sec:"Exploration",type:"ta",text:q.text,ph:PH}); });
  CLOSING.forEach(function(q){ out.push({id:q.id,sec:q.sec,type:q.type,text:q.text,ph:q.ph}); });
  return out;
}
function saveAns() {
  var q = S.qs[S.qi]; if(!q) return;
  if(q.type==="3w") {
    ["_1","_2","_3"].forEach(function(s){
      var el=document.getElementById("a_"+q.id+s); if(el) S.ans[q.id+s]=el.value;
    });
  } else {
    var el=document.getElementById("a_"+q.id); if(el) S.ans[q.id]=el.value;
  }
}
function show(html) { document.getElementById("app").innerHTML=html; window.scrollTo(0,0); }
function updProg() {
  var pw=document.getElementById("prog");
  if(S.step!=="q"){pw.style.display="none";return;}
  pw.style.display="block";
  var tot=S.qs.length, pct=Math.round(S.qi/tot*100);
  document.getElementById("plbl").textContent="Question "+(S.qi+1)+" sur "+tot;
  document.getElementById("ppct").textContent=pct+"%";
  document.getElementById("pfill").style.width=pct+"%";
}

function renderWelcome() {
  S.step="welcome"; updProg();
  show('<div class="screen">'
    +'<div style="text-align:center"><p class="eyebrow">Interview · Dynamiques familiales</p>'
    +'<h1 class="hero">Ta Place,<br>Ton Histoire,<br>Ta Lumiere</h1></div>'
    +'<div class="card">'
    +'<p class="iq">Comprendre d\'ou tu viens, c\'est deja choisir ou tu vas.</p>'
    +'<p class="para">Bienvenue dans cet espace d\'ecoute et de reflexion. Ce questionnaire explore ta place dans ta famille, comment tu t\'es construit(e), et comment tu t\'emancipes.</p>'
    +'<p class="para">Il n\'y a ici ni bonne ni mauvaise reponse. Prends le temps qu\'il te faut.</p>'
    +'<p class="para">Duree estimee : <strong style="color:#A8BCF6">30 minutes</strong>.</p>'
    +'<button class="bprim" onclick="renderSetup()">Commencer l\'exploration</button>'
    +'</div></div>');
}

function renderSetup() {
  S.step="setup"; updProg();
  var btns=PROFILES.map(function(p){
    var cls=S.pid===p.id?" on":"";
    return '<button class="pbtn'+cls+'" onclick="pickProfile(\''+p.id+'\')"><div class="pi">'+p.em+'</div><div class="pn">'+h(p.lb)+'</div></button>';
  }).join("");
  show('<div class="screen">'
    +'<h2 class="sh">Avant de commencer</h2>'
    +'<p class="para" style="margin-bottom:2rem">Ces informations personnalisent l\'experience pour toi.</p>'
    +'<label class="lbl">Ton prenom</label>'
    +'<input class="txt-in" id="nin" type="text" placeholder="Comment tu t\'appelles ?" value="'+h(S.name)+'" autocomplete="off">'
    +'<label class="lbl">Ton profil dans la fratrie</label>'
    +'<div class="pgrid">'+btns+'</div>'
    +'<p class="errhint" id="perr">Merci de selectionner ton profil pour continuer.</p>'
    +'<div class="nav">'
    +'<button class="bback" onclick="renderWelcome()">Retour</button>'
    +'<button class="bnext" onclick="startQs()">Continuer</button>'
    +'</div></div>');
}

function pickProfile(pid) {
  var el=document.getElementById("nin"); if(el) S.name=el.value;
  S.pid=pid; renderSetup();
}
function startQs() {
  var el=document.getElementById("nin"); if(el) S.name=el.value.trim();
  if(!S.name){if(el)el.focus();return;}
  if(!S.pid){var e=document.getElementById("perr");if(e)e.style.display="block";return;}
  S.qs=buildQs(S.pid); S.qi=0; renderQ();
}

function renderQ() {
  S.step="q"; updProg();
  var q=S.qs[S.qi], tot=S.qs.length;
  var inp;
  if(q.type==="3w") {
    inp='<div class="thr">'
      +'<input class="win" id="a_'+q.id+'_1" type="text" placeholder="Mot 1" value="'+h(S.ans[q.id+"_1"]||"")+'">'
      +'<input class="win" id="a_'+q.id+'_2" type="text" placeholder="Mot 2" value="'+h(S.ans[q.id+"_2"]||"")+'">'
      +'<input class="win" id="a_'+q.id+'_3" type="text" placeholder="Mot 3" value="'+h(S.ans[q.id+"_3"]||"")+'"></div>';
  } else {
    inp='<textarea class="ata" id="a_'+q.id+'" rows="6" placeholder="'+h(q.ph)+'">'+h(S.ans[q.id]||"")+'</textarea>';
  }
  var prevBtn=S.qi===0
    ?'<button class="bback" onclick="renderSetup()">Precedent</button>'
    :'<button class="bback" onclick="prevQ()">Precedent</button>';
  var nextBtn=S.qi===tot-1
    ?'<button class="bsub" id="sbtn" onclick="submitForm()">Envoyer mes reponses</button>'
    :'<button class="bnext" onclick="nextQ()">Suivant</button>';
  show('<div class="screen"><div class="card">'
    +'<div class="qmeta"><span>Q'+(S.qi+1)+'/'+tot+'</span><span class="qline"></span>'
    +'<span class="qbadge" style="'+secStyle(q.sec)+'">'+q.sec+'</span></div>'
    +'<p class="qtext">'+h(q.text)+'</p>'
    +inp+'</div>'
    +'<p class="ferr" id="ferr"></p>'
    +'<div class="nav">'+prevBtn+nextBtn+'</div></div>');
}

function prevQ(){ saveAns(); S.qi--; renderQ(); }
function nextQ(){ saveAns(); S.qi++; renderQ(); }

async function submitForm() {
  saveAns();
  var btn=document.getElementById("sbtn");
  if(btn){btn.disabled=true;btn.textContent="Envoi en cours...";}
  var p=PROFILES.find(function(x){return x.id===S.pid;});
  var msg="INTERVIEW FAMILLE\nPrenom : "+S.name+"\nProfil : "+(p?p.lb:S.pid)+"\n\n";
  S.qs.forEach(function(q,i){
    msg+="Q"+(i+1)+" ["+q.sec+"] "+q.text+"\n";
    if(q.type==="3w") msg+="Rep : "+(S.ans[q.id+"_1"]||"")+" / "+(S.ans[q.id+"_2"]||"")+" / "+(S.ans[q.id+"_3"]||"")+"\n\n";
    else msg+="Rep : "+(S.ans[q.id]||"(vide)")+"\n\n";
  });
  try {
    var r=await fetch("https://api.web3forms.com/submit",{
      method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({access_key:KEY,subject:"Interview - "+(p?p.lb:"")+" - "+S.name,from_name:S.name,message:msg})
    });
    var d=await r.json();
    if(d.success) renderDone();
    else throw new Error(d.message||"Erreur serveur");
  } catch(e) {
    var fe=document.getElementById("ferr");
    if(fe){fe.style.display="block";fe.textContent="Erreur : "+e.message;}
    if(btn){btn.disabled=false;btn.textContent="Reessayer";}
  }
}

function buildRecapHTML() {
  var p=PROFILES.find(function(x){return x.id===S.pid;});
  var now=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  var secs={Ouverture:[],Exploration:[],Cloture:[]};
  S.qs.forEach(function(q){
    var sec=q.sec;
    var ans=q.type==="3w"
      ?[(S.ans[q.id+"_1"]||""),(S.ans[q.id+"_2"]||""),(S.ans[q.id+"_3"]||"")].filter(Boolean).join(" / ")
      :(S.ans[q.id]||"");
    if(secs[sec]) secs[sec].push({text:q.text,ans:ans});
  });
  var cols={Ouverture:"#A8BCF6",Exploration:"#9B5BBD",Cloture:"#DF9C6A"};
  var body="";
  ["Ouverture","Exploration","Cloture"].forEach(function(sec){
    var items=secs[sec]; if(!items||!items.length) return;
    var c=cols[sec];
    body+='<div style="margin-bottom:3rem">';
    body+='<h2 style="font-size:.85rem;font-weight:400;color:'+c+';letter-spacing:.18em;text-transform:uppercase;border-bottom:1px solid '+c+'55;padding-bottom:.75rem;margin-bottom:1.75rem">'+sec+'</h2>';
    items.forEach(function(item){
      body+='<div style="margin-bottom:1.75rem;padding-bottom:1.75rem;border-bottom:1px solid rgba(255,255,255,.06)">';
      body+='<p style="font-family:Georgia,serif;font-size:1.1rem;color:#E8E2DB;line-height:1.5;margin-bottom:.75rem">'+h(item.text)+'</p>';
      if(item.ans) body+='<p style="color:#C5BFB8;font-size:.9rem;line-height:1.85;white-space:pre-wrap">'+h(item.ans)+'</p>';
      else body+='<p style="color:rgba(255,255,255,.2);font-size:.85rem;font-style:italic">pas de reponse</p>';
      body+='</div>';
    });
    body+='</div>';
  });
  return '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">'
    +'<title>Mon recap - '+h(S.name)+'</title>'
    +'<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">'
    +'<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#090C0B;color:#F0EBE3;font-family:Inter,sans-serif;padding:3rem 1.5rem;line-height:1.7}.page{max-width:680px;margin:0 auto}'
    +'@media print{.noprint{display:none!important}body{background:#fff;color:#111}}'
    +'</style></head><body><div class="page">'
    +'<div style="text-align:center;margin-bottom:3.5rem;padding-bottom:2rem;border-bottom:1px solid rgba(255,255,255,.09)">'
    +'<p style="font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#DF9C6A;margin-bottom:1rem">Interview · Dynamiques familiales</p>'
    +'<h1 style="font-family:\'Cormorant Garamond\',serif;font-size:3rem;font-weight:300;background:linear-gradient(140deg,#A8BCF6,#DF9C6A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem">'+h(S.name)+'</h1>'
    +'<p style="color:#8A857F;font-size:.9rem">'+h(p?p.lb:"")+'  /  '+now+'</p>'
    +'</div>'
    +body
    +'<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-left:3px solid #DF9C6A;border-radius:16px;padding:1.75rem 2rem;margin-bottom:2.5rem">'
    +'<p style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#DF9C6A;margin-bottom:.75rem">Un message pour toi</p>'
    +'<blockquote style="font-family:\'Cormorant Garamond\',serif;font-size:1.15rem;font-style:italic;color:#F0EBE3;line-height:1.7">'+h(p?p.msg:"")+'</blockquote>'
    +'</div>'
    +'<div class="noprint" style="text-align:center">'
    +'<p style="color:#8A857F;font-size:.8rem;margin-bottom:.75rem">Pour sauvegarder en PDF : Ctrl+P puis "Enregistrer en PDF"</p>'
    +'<button onclick="window.print()" style="padding:.875rem 2rem;background:linear-gradient(135deg,#2B544E,#6B3785);color:#fff;border:none;border-radius:12px;font-family:Inter,sans-serif;font-size:.9rem;cursor:pointer">Imprimer / Sauvegarder en PDF</button>'
    +'</div></div></body></html>';
}

function downloadRecap() {
  var html=buildRecapHTML();
  var blob=new Blob([html],{type:"text/html;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="recap-"+S.name.toLowerCase().replace(/\s+/g,"-")+".html";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function renderDone() {
  S.step="done"; updProg();
  var p=PROFILES.find(function(x){return x.id===S.pid;});
  show('<div class="screen" style="padding-top:3rem">'
    +'<div style="text-align:center;margin-bottom:2rem">'
    +'<div style="font-size:3.5rem;margin-bottom:1.5rem">🌿</div>'
    +'<h2 class="tytitle">Merci, '+h(S.name)+'.</h2>'
    +'<p class="para" style="max-width:440px;margin:0 auto">Tes reponses ont ete envoyees. Ce que tu viens de partager a de la valeur.</p>'
    +'</div>'
    +'<div class="insp"><p class="insplbl">Un message pour toi</p>'
    +'<blockquote class="inspq">'+h(p?p.msg:"")+'</blockquote></div>'
    +'<div style="margin-top:1.5rem;background:rgba(168,188,246,.07);border:1px solid rgba(168,188,246,.2);border-radius:20px;padding:1.75rem 2rem">'
    +'<p style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#A8BCF6;margin-bottom:.5rem">Ton recapitulatif personnel</p>'
    +'<p class="para" style="margin-bottom:1.25rem;font-size:.88rem">Toutes tes reponses dans un document a garder pour toi. Tu peux aussi l\'imprimer en PDF.</p>'
    +'<button class="bnext" style="width:100%;border-radius:14px;padding:1rem" onclick="downloadRecap()">Telecharger mon recap</button>'
    +'</div></div>');
}

if (document.readyState === 'loading') {
  document.addEventListener("DOMContentLoaded", renderWelcome);
} else {
  renderWelcome();
}
</script>
